<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;line-height:1.8;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-touch-callout:none;}
img{-webkit-user-drag:none;pointer-events:none;}

/* ── 側欄 ── */
aside.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sbW);background:var(--sbBg);z-index:100;display:flex;flex-direction:column;align-items:center;padding:18px 0 24px;overflow-y:auto;scrollbar-width:none;}
aside.sb::-webkit-scrollbar{display:none;width:0;}
.sb-title{color:var(--gold);font-family:"Noto Sans TC",sans-serif;font-size:12px;letter-spacing:3px;text-align:center;margin-bottom:16px;line-height:1.3;padding:0 6px;}
.sb-nav{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;flex:1;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;cursor:pointer;padding:6px 2px;border-radius:var(--r);width:60px;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-circle{width:34px;height:34px;border-radius:50%;background:#3d3225;color:var(--sbText);display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;border:1.5px solid transparent;transition:all .2s;}
.sb-label{color:var(--sbText);font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.5px;text-align:center;line-height:1.2;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;border-color:var(--goldL);box-shadow:0 0 18px rgba(184,134,11,.55);}
.sb-item.active .sb-label{color:var(--goldL);}

/* ── 漢堡 ── */
#sbToggle{display:none;position:fixed;top:12px;left:12px;z-index:130;width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:rgba(30,26,20,.88);color:var(--gold);font-size:22px;cursor:pointer;}

/* ── 主區 ── */
.main{margin-left:var(--sbW);min-height:100vh;padding:0 0 60px;}

/* ── Hero ── */
.site-hero{position:relative;background:var(--headGrad);color:#fff;padding:88px 28px 70px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:400px;font-family:"Noto Serif TC",serif;color:#fff;opacity:.035;font-weight:900;letter-spacing:.3em;pointer-events:none;}
.hero-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:4px;color:var(--goldL);margin-bottom:14px;position:relative;z-index:2;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:.18em;margin-bottom:12px;color:#fff;position:relative;z-index:2;}
.hero-subtitle{font-size:22px;letter-spacing:.45em;color:var(--goldL);margin-bottom:22px;position:relative;z-index:2;}
.hero-author{font-size:16px;color:#e4d7bb;margin-bottom:24px;letter-spacing:3px;position:relative;z-index:2;}
.hero-range{display:inline-block;background:rgba(184,134,11,.15);border:1px solid var(--gold);color:var(--goldL);padding:8px 24px;border-radius:30px;font-size:15px;letter-spacing:3px;position:relative;z-index:2;font-family:"Noto Sans TC",sans-serif;}

/* ── 前言 ── */
.preface{max-width:880px;margin:48px auto 30px;padding:0 28px;}
.preface-title{font-family:"Noto Serif TC",serif;font-size:30px;color:var(--accent);text-align:center;margin-bottom:30px;letter-spacing:.2em;position:relative;padding-bottom:18px;}
.preface-title::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:2px;background:var(--gold);}
.preface p{font-size:17.5px;line-height:2.05;color:var(--text2);margin-bottom:18px;text-align:justify;text-indent:2em;}

/* ── 總目錄 ── */
.toc-section{max-width:1100px;margin:44px auto 28px;padding:0 28px;}
.toc-title{font-family:"Noto Serif TC",serif;font-size:34px;color:var(--accent);text-align:center;margin-bottom:10px;letter-spacing:.35em;position:relative;padding-bottom:16px;}
.toc-title::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:2px;background:var(--gold);}
.toc-desc{text-align:center;color:var(--text-muted);font-size:15px;letter-spacing:3px;margin-bottom:30px;font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;text-decoration:none;color:inherit;display:flex;gap:14px;align-items:flex-start;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.toc-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 14px rgba(184,134,11,.15);}
.toc-num{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;font-weight:600;font-size:15.5px;}
.toc-body{flex:1;}
.toc-name{font-size:16.5px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:3px;}
.toc-sub{font-size:12.5px;color:var(--text-muted);letter-spacing:1.5px;font-family:"Noto Sans TC",sans-serif;line-height:1.5;}

/* ── 章節 ── */
.chapter{margin:44px auto 0;max-width:1100px;padding:0 28px;}
.ch-head{background:var(--headGrad);color:#fff;padding:38px 28px 30px;border-radius:12px 12px 0 0;text-align:center;position:relative;}
.ch-head::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:2px;background:var(--gold);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:15px;color:var(--goldL);letter-spacing:4px;margin-bottom:10px;}
.ch-name{font-size:32px;font-weight:700;letter-spacing:.18em;margin-bottom:8px;}
.ch-sub{font-size:15.5px;color:#e4d7bb;letter-spacing:2px;}
.ch-body{background:var(--card);padding:30px 24px 32px;border-radius:0 0 12px 12px;border:1px solid var(--border);border-top:none;box-shadow:0 2px 14px rgba(91,58,41,.08);}

/* ── 橋接卡片 ── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:11.5px;background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:16px;}

/* ── iframe ── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin-top:18px;padding:8px 20px;border:1px solid var(--gold);color:var(--gold);text-decoration:none;border-radius:24px;font-family:"Noto Sans TC",sans-serif;font-size:14.5px;letter-spacing:2px;transition:all .2s;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ── 底部膠囊 ── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* ── 回頂 ── */
#backTop{display:none;position:fixed;right:20px;bottom:68px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.2);z-index:110;}
#backTop.show{display:block;}

/* ── 頁尾 ── */
.site-footer{margin-top:70px;padding:30px 28px;text-align:center;color:var(--text-muted);font-size:14px;letter-spacing:3px;border-top:1px solid var(--border);}

/* ── 響應式 ── */
@media (max-width:900px){
  aside.sb{transform:translateX(-100%);transition:transform .25s;}
  aside.sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:42px;}
  .ch-name{font-size:26px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:36px;}
  .site-hero{padding:60px 18px 50px;}
  .chapter{padding:0 14px;}
  .ch-head{padding:28px 16px 22px;}
}

/* ============ 1.2x 字級放大（buddhist-text-html 新卷預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}

.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}

<script>

/* ── L1 · data-b64 → srcdoc 解碼器 ── */
(function(){
  var K = [23,43,92,145,78,131,162,55,200,25,109,244,8,181,114,74];
  function dec(b){
    try{
      var raw = atob(b);
      var len = raw.length;
      var bytes = new Uint8Array(len);
      for(var i=0; i<len; i++){
        bytes[i] = raw.charCodeAt(i) ^ K[i % K.length];
      }
      return new TextDecoder('utf-8').decode(bytes);
    }catch(e){ return ''; }
  }
  document.querySelectorAll('iframe[data-b64]').forEach(function(f){
    var b = f.getAttribute('data-b64');
    if(!b) return;
    var txt = dec(b);
    if(txt){
      f.setAttribute('srcdoc', txt);
      f.removeAttribute('data-b64');
    }
  });
  /* ── L5 · 外層殼層文字還原（<span data-c>） ── */
  function restoreShell(root){
    (root || document).querySelectorAll('span[data-c]').forEach(function(s){
      var b = s.getAttribute('data-c');
      if(!b) return;
      var t = dec(b);
      if(t){
        s.textContent = t;
        s.removeAttribute('data-c');
      }
    });
  }
  restoreShell(document);
  /* 防禦性：DOM 若後續有變動再掃一次（冪等） */
  if(document.readyState !== 'complete'){
    window.addEventListener('load', function(){ restoreShell(document); }, {once:true});
  }
})();

/* 防複製 */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart','mousedown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      if(ev==='mousedown' && e.button!==2) return;
      blk(e);
    },true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);
})();

/* 漢堡 */
var sb=document.getElementById('sb'), sbToggle=document.getElementById('sbToggle');
if(sbToggle){sbToggle.addEventListener('click',function(){ sb.classList.toggle('open'); });}

/* 回頂 */
var bt=document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(window.scrollY>600) bt.classList.add('show'); else bt.classList.remove('show');
}, {passive:true});
bt.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });

/* 進度條 */
var rpFill=document.getElementById('rpFill'), rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight - window.innerHeight;
  var pct=sh>0 ? Math.min(100, Math.max(0, window.scrollY/sh*100)) : 0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct)  rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

/* iframe 自動高度（body.scrollHeight 策略，無 buffer） */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* 外層錨點點擊 → 先重算再捲動 */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* 前 15 秒持續輪詢 */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

/* 側欄高亮 */
function syncSidebar(){
  var chapters = document.querySelectorAll('.chapter');
  var actIdx = -1;
  var vpTrigger = window.innerHeight * 0.35;
  for(var i=0; i<chapters.length; i++){
    var r = chapters[i].getBoundingClientRect();
    if(r.top < vpTrigger) actIdx = i;
  }
  document.querySelectorAll('.sb-item').forEach(function(el, idx){
    if(idx === actIdx) el.classList.add('active');
    else el.classList.remove('active');
  });
}
window.addEventListener('scroll', syncSidebar, {passive:true});
window.addEventListener('load', syncSidebar);
syncSidebar();
</script>

<script>
(function(){
  /* ── L2 · 強化鍵盤封鎖（覆蓋 Cmd 鍵）── */
  var blk = function(e){ e.preventDefault(); e.stopPropagation(); return false; };
  document.addEventListener('keydown', function(e){
    var k = (e.key||'').toLowerCase();
    var mod = e.ctrlKey || e.metaKey;
    /* 儲存 / 另存 / 列印 / 複製 / 全選 / 原始碼 / 剪下 */
    if(mod && (k==='s' || k==='p' || k==='c' || k==='a' || k==='u' || k==='x' || k==='j')){ return blk(e); }
    /* DevTools 開關 */
    if(k==='f12') return blk(e);
    if((e.ctrlKey||e.metaKey) && e.shiftKey && (k==='i'||k==='j'||k==='c'||k==='k'||k==='s'||k==='p')) return blk(e);
  }, true);

  /* ── L3 · 列印覆寫 ── */
  try{
    window.print = function(){ return false; };
    Object.defineProperty(window, 'print', {value:function(){return false;}, writable:false, configurable:false});
  }catch(e){}
  window.addEventListener('beforeprint', function(e){ e.preventDefault(); document.body.classList.add('__noprint'); }, true);
  window.addEventListener('afterprint', function(){ document.body.classList.remove('__noprint'); }, true);

  /* 週期清除選取 */
  setInterval(function(){
    try{ if(window.getSelection) window.getSelection().removeAllRanges(); }catch(e){}
  }, 300);
})();
</script>
