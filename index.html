:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;

  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.8;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}

/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  width:100%;padding:5px 4px;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:background .2s,color .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.16);}
.sb-item.active{background:rgba(184,134,11,.92);color:#1e1a14;
  box-shadow:0 0 14px rgba(184,134,11,.5);}
.sb-item.active .sb-circle{border-color:#1e1a14;color:#1e1a14;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;color:var(--goldL);}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;
  text-align:center;line-height:1.25;letter-spacing:.3px;}
/* 卷間連結（金線區隔）*/
.sb-sep{width:62%;height:1px;margin:16px auto 12px;
  background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);opacity:.85;}
.sb-vol-nav{display:flex;flex-direction:column;align-items:center;gap:7px;width:100%;
  padding-bottom:6px;}
.sb-vol-link{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;
  padding:6px 4px;text-decoration:none;color:var(--goldL);border-radius:6px;
  font-family:"Noto Sans TC",sans-serif;transition:background .2s,color .2s;}
.sb-vol-link:hover{background:rgba(184,134,11,.18);color:#f0d894;}
.sb-vol-ic{font-size:15px;line-height:1;}
.sb-vol-tx{font-size:11px;letter-spacing:.5px;}

/* main */
.main{margin-left:var(--sbW);max-width:none;}
.site-hero{position:relative;background:var(--headGrad);color:#fff;
  text-align:center;padding:64px 24px 56px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:240px;font-weight:900;
  color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;}
.hero-title{position:relative;font-size:56px;font-weight:900;color:var(--goldL);
  letter-spacing:6px;margin:0 0 16px;}
.hero-subtitle{position:relative;font-size:20px;color:#e8dcc2;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:2px;margin:0 0 14px;}
.hero-meta{position:relative;font-size:17px;color:#cbb990;
  font-family:"Noto Sans TC",sans-serif;margin:0 0 10px;}
.hero-range{position:relative;font-size:16px;color:#b8a06f;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:3px;
  border:1px solid rgba(184,134,11,.4);display:inline-block;
  padding:6px 20px;border-radius:20px;margin-top:8px;}

/* preface */
.preface{max-width:880px;margin:40px auto 8px;padding:0 28px;}
.preface h2{font-size:30px;color:var(--accent);text-align:center;
  letter-spacing:6px;margin:0 0 24px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;
  text-align:justify;}

/* TOC */
.toc-section{max-width:1100px;margin:40px auto 16px;padding:0 28px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;
  letter-spacing:8px;margin:0 0 8px;}
.toc-desc{font-size:17px;color:var(--text-muted);text-align:center;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:2px;margin:0 0 28px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.toc-card{display:flex;align-items:flex-start;gap:14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px 20px;text-decoration:none;color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s,border-color .2s;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;line-height:1.7;color:var(--accent);margin:0 0 4px;}
.toc-sub{font-size:15px;color:var(--text-muted);font-family:"Noto Sans TC",sans-serif;line-height:1.5;}

/* chapter section */
.chapter{margin:40px 0 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:44px 24px 38px;position:relative;}
.ch-num{font-size:18px;color:var(--goldL);font-family:"Noto Sans TC",sans-serif;
  letter-spacing:4px;margin-bottom:12px;}
.ch-name{font-size:34px;font-weight:900;color:#fff;letter-spacing:3px;margin:0 0 12px;}
.ch-sub{font-size:17px;color:#d8c8a4;font-family:"Noto Sans TC",sans-serif;
  letter-spacing:1px;max-width:760px;margin:0 auto;line-height:1.7;}
.ch-head::after{content:"";display:block;width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:28px 24px 8px;}

/* bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

  pointer-events:none;user-select:none;backdrop-filter:blur(6px);

.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;

#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:130;

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}

  .hero-title{font-size:40px;}
  .ch-name{font-size:26px;}
  .ch-head,.site-hero{padding-left:16px;padding-right:16px;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:32px;}
}

.sb-x-label{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;

.sb-x:hover .sb-x-label{color:var(--goldL,#d4a84b);opacity:1;}
.sb-x-hub .sb-x-glyph{background:linear-gradient(135deg,

  font-weight:700;letter-spacing:1px;}

(function(){
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){sbBrand.addEventListener('click',function(e){
    e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}
  var toggle=document.getElementById('sbToggle');
  var sb=document.getElementById('sb');
  if(toggle&&sb){toggle.addEventListener('click',function(){sb.classList.toggle('open');});}

  var rpFill=document.getElementById('rpFill');
  var rpPct=document.getElementById('rpPct');
  function updateProgress(){
    var sh=document.documentElement.scrollHeight-window.innerHeight;
    var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
    if(rpFill)rpFill.style.width=pct+'%';
    if(rpPct)rpPct.textContent=Math.round(pct)+'%';
  }
  window.addEventListener('scroll',updateProgress,{passive:true});
  updateProgress();

  // 進度膠囊接近頁尾淡出
  (function(){
    var cap=document.getElementById('readProgress');
    if(!cap)return;
    function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
    var targets=[];var f2=document.querySelector('.site-footer');if(f2)targets.push(f2);
    if(!targets.length)return;
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(entries){
        setHide(entries.some(function(e){return e.isIntersecting;}));
      },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
      targets.forEach(function(t){io.observe(t);});
    }
  })();

  // back to top
  var bt=document.getElementById('backTop');
  if(bt){
    window.addEventListener('scroll',function(){
      bt.classList.toggle('show',window.scrollY>600);
    },{passive:true});
    bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
  }

  // iframe 自動高度
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body)return;
      d.body.style.minHeight='0';d.body.style.height='auto';
      if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
      var h=d.body.scrollHeight;
      if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
    if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
    else{f.addEventListener('load',tick);}
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  // 暴露給防護解碼器：解碼換新 iframe 後會呼叫 window.setupFrame 重啟自動高度
  window.setupFrame=setupFrame;
  window.resizeFrame=resizeFrame;
  window.resizeAllFrames=resizeAllFrames;
  var rzT;
  window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

  // 錨點點擊防錯跳
  document.addEventListener('click',function(e){
    var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
    if(!a)return;var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#'||h.length<2)return;
    var el=document.getElementById(h.substring(1));if(!el)return;
    e.preventDefault();resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});
    },60);
  },true);

  var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

  // 節層級深連結：#chapter-{品}-{章}-{節} 跨 iframe 捲動到對應節
  function gotoSection(hash){
    var m=/^#?chapter-(\d+)-(\d+)-(\d+)$/.exec(hash||'');
    if(!m)return false;
    var pin=parseInt(m[1],10);
    var frames=document.querySelectorAll('iframe.ch-frame');
    if(pin<1||pin>frames.length)return false;
    var f=frames[pin-1];
    var targetId='chapter-'+m[1]+'-'+m[2]+'-'+m[3];
    var tries=0;
    (function poll(){
      tries++;
      resizeAllFrames();
      var el=null;
      try{var d=f.contentDocument||f.contentWindow.document;
          if(d)el=d.getElementById(targetId);}catch(e){}
      if(el){
        var inY=el.getBoundingClientRect().top;
        var frY=f.getBoundingClientRect().top+window.scrollY;
        window.scrollTo({top:frY+inY-20,behavior:'smooth'});
        // iframe 解碼/高度可能仍在變動，再校正一次
        if(tries<6)setTimeout(poll,260);
      } else if(tries<40){ setTimeout(poll,180); }
    })();
    return true;
  }
  window.addEventListener('hashchange',function(){gotoSection(location.hash);});
  if(/^#chapter-\d+-\d+-\d+$/.test(location.hash)){
    setTimeout(function(){gotoSection(location.hash);},800);
  }
  window.wyGotoSection=gotoSection;

  // 側欄高亮
  function highlight(){
    var secs=document.querySelectorAll('section.chapter');
    var items=document.querySelectorAll('.sb-item');
    var act=-1,vh=window.innerHeight*0.35;
    secs.forEach(function(s,i){if(s.getBoundingClientRect().top<vh)act=i;});
    items.forEach(function(it,i){it.classList.toggle('active',i===act);});
    if(act>=0&&items[act]){
      var sbEl=document.getElementById('sb');
      var r=items[act].getBoundingClientRect();
      if(r.top<80||r.bottom>window.innerHeight-40){
        sbEl.scrollTo({top:items[act].offsetTop-sbEl.clientHeight/2,behavior:'smooth'});
      }
    }
  }
  window.addEventListener('scroll',highlight,{passive:true});highlight();

  // 防複製（外層）
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>=0)blk(e);
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>=0)blk(e);
  },true);
})();
</script>

(function(){

    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-25-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
